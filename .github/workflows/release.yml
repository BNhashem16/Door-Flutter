name: Release

# Push to master → build a signed release APK and publish it as a GitHub Release.
# Same pubspec version  → updates that version's release with the new APK.
# Bumped pubspec version → creates a new release.
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  release:
    name: 🚀 Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | tr -d ' \r')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/release.jks"

      - name: Restore .env (bundled asset)
        run: echo "${{ secrets.DOTENV_BASE64 }}" | base64 -d > .env

      - name: flutter pub get
        run: flutter pub get

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Rename APK with version
        run: cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/Door-${{ steps.version.outputs.tag }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Door ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: build/app/outputs/flutter-apk/Door-${{ steps.version.outputs.tag }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
